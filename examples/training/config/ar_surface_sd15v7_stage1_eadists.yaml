#第二阶段收益有限  甚至不确定是否有提升   parse + sketch 收益不明显

wandb_project: ar-stage1-v7-eadists-1  #实验名
save_ckpt_path: /root/storage/shuqian/LBM_out/ar-stage1-v7-eadists-1 #权重保存路径

train_mode: backbone_only
log_interval: 125        #隔多久想swanlab记录一次 loss/train  5epoch
resume_from_checkpoint: false  #是否继续训练
init_from_checkpoint: null
max_epochs: 600
bridge_noise_sigma: 0.005
save_interval: 2500   #多久保存一次权重  100epoch

val_check_interval: 250  #多久进行一次评估  10epoch
limit_val_batches: 6  #总共跑几个 batch

eval_num_steps: [1, 2, 4]  #评估时要采样的步数
eval_max_batches: 6    #每次评估用几个 validation batch
eval_max_samples: 4    #每个评估 batch 里最多取几张图用于生成图像和计算指标
eval_upload_images: false # 是否上传评估拼图

eval_compute_fid: false #是否计算fid

# 评估时保存图片
eval_save_images: true  #是否保存
eval_save_size: [200, 250]   # [width, height]
eval_save_dir: null          # 不写则默认保存到 save_ckpt_path/eval_images

#训练中评估在256×256 空间里算的

# 外部指标计算
eval_external_metrics: true
eval_external_metrics_steps: [4]  #只计算4步生成的
eval_external_metrics_every_n_evals: 1   # 每次评估都算；可改成2、3降低频率
eval_external_metrics_device: cpu        # 推荐 cpu，避免和训练抢GPU cpu cuda  cuda:0
eval_external_metrics_batch_size: 8

# GT 原图文件夹
eval_gt_dir: /root/shuqian/dataset/AR_LBM_raw/test_B

# 选择要算什么
eval_external_image_metrics: true   #ALL
eval_external_rank_metrics: true    #rank_new

# 权重缓存路径
eval_external_deepface_home: /root/shuqian/checkpoints
eval_external_inception_v3_path: /root/shuqian/checkpoints/inception_v3_google-0cc3c7bd.pth

# 外部指标脚本
eval_external_metrics_script: tools/calc_external_metrics.py

eval_external_metrics_wait_on_fit_end: true
eval_external_metrics_wait_timeout: 1800   #训练结束后等待时间  30min
eval_external_metrics_poll_interval: 5

backbone_signature: /root/dataset/weights/stable-diffusion-v1-5-min  #sd15权重路径

train_shards:
  - /root/shuqian/dataset/AR_LBM_wds/ar_train-{000000..000000}.tar

validation_shards:
  - /root/shuqian/dataset/AR_LBM_wds/ar_val-{000000..000000}.tar

source_key: image
target_key: normal
mask_key: mask

batch_size: 4
learning_rate: 5e-5
optimizer: AdamW

num_steps: [1, 2, 4]

timestep_sampling: uniform

unet_input_channels: 4
vae_num_channels: 4

# 用 EA-DISTS 替代 LPIPS
pixel_loss_type: ea_dists
pixel_loss_weight: 1.0

# EA-DISTS = DISTS + edge_weight * DISTS(Sobel)
ea_dists_edge_weight: 1.0
ea_dists_use_edge: true
ea_dists_edge_to_rgb: true
ea_dists_edge_normalize: true
ea_dists_resize_to: null

latent_loss_type: l2
latent_loss_weight: 1.0

#或者可以微调
#1.先用你之前效果最好的 无 ID loss 模型 作为初始化；
#2.再用小 ID loss 微调；
#3.学习率降低。
# V1 先关闭 ID loss，避免变量混杂
id_loss_weight: 0.0   # 设置0.02~0.05之间，太大会降低除人脸识别外的指标  0.02 0.03（值得尝试）
id_loss_model_path: /root/shuqian/checkpoints/model_ir_se50.pth
id_loss_crop: false

conditioning_images_keys: []
conditioning_masks_keys: []

# ---------- Face Adapter V2: parsing + sketch ----------

use_face_adapter: false

# parsing condition
parse_key: parse
parse_num_classes: 19

# sketch condition
# 当前 WebDataset 里 jpg 会被 mapper 重命名为 image；
# 你的 source_key 也是 image，所以这里直接用 image。
use_sketch_face_adapter: false
sketch_key: image
sketch_in_channels: 3

# adapter residual scale
parse_adapter_scale: 0.5 #0.5的效果会比1的人脸识别更好

# 小数据集先不要开 condition dropout，避免变量混杂
parse_adapter_condition_dropout: 0.0

# 当前历史实验中 mid block 容易扰动 backbone，先关闭
parse_adapter_include_mid: false

# projection zero-init 保持稳定
parse_adapter_zero_init: true

# 你当前 v6 stage2 里是 false，先保持一致
parse_adapter_use_scale_gates: false
parse_adapter_gate_init: 1.0

# coarse face 先关闭，等 parsing+sketch 有效果后再打开
use_coarse_face_adapter: false
coarse_face_key: null
coarse_in_channels: 3
